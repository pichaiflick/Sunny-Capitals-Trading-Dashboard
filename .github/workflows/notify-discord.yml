name: Notify Discord on update

# Posts to your Discord channel when you push to main (small update note)
# or publish a Release (a polished announcement with the banner).
# Requires a repo secret called DISCORD_WEBHOOK.

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Discord message
        env:
          # All GitHub-context values are passed through env vars (never inlined
          # into the script with ${{ }}) so untrusted text — especially a release
          # body — can't be interpreted as shell commands. See:
          # https://docs.github.com/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK secret set — skipping."
            exit 0
          fi

          BANNER="https://raw.githubusercontent.com/$REPO/main/banner.png"

          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
            URL="$RELEASE_URL"
            NOTES="$RELEASE_BODY"
            [ -z "$NOTES" ] && NOTES="A new version of Sunny Capitals is available."
            PAYLOAD=$(jq -nc \
              --arg t "🚀 Sunny Capitals $TAG is here" \
              --arg d "$NOTES" \
              --arg u "$URL" \
              --arg img "$BANNER" \
              '{username:"Sunny Capitals",
                embeds:[{
                  title:$t,
                  description:($d|.[0:1800]),
                  url:$u,
                  color:58784,
                  image:{url:$img},
                  fields:[
                    {name:"📦 Download", value:("[Get the latest build]("+$u+")"), inline:true},
                    {name:"🔄 Updating", value:"Dashboard UI auto-updates · re-download for the full update", inline:true}
                  ],
                  footer:{text:"Sunny Capitals · Trading Dashboard"}
                }]}')
          else
            VER=$(jq -r '.version // "?"' version.json 2>/dev/null || echo "?")
            MSG=$(git log -1 --pretty=%B)
            URL="https://github.com/$REPO"
            PAYLOAD=$(jq -nc \
              --arg t "📈 Sunny Capitals updated · v$VER" \
              --arg d "$MSG" \
              --arg u "$URL" \
              '{username:"Sunny Capitals",
                embeds:[{
                  title:$t,
                  description:($d|.[0:1500]),
                  url:$u,
                  color:58784,
                  footer:{text:"Dashboard UI auto-updates on next launch · re-download for backend changes"}
                }]}')
          fi

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"
